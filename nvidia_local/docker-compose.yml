version: '3.8'

services:
  # SAM 3D Objects SLAT inference service
  slat-service:
    build:
      context: ..
      dockerfile: nvidia_local/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      # Mount project directory for live code changes
      - ../models/sam-3d-objects:/app/sam-3d-objects
      - ./SAM3D:/app/SAM3D
      # Mount frontend data folder so the SLAT service can read input images
      # and write GLB outputs to the same place the Next.js app reads from.
      - ../flipperzillow/src/data:/app/data
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - flipperzillow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s

networks:
  flipperzillow:
    driver: bridge
